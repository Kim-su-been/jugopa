# Render Blueprint — Jugopa 백엔드 (Django + Gunicorn) · 무료(Free) 구성
# DB는 Supabase(Postgres), 미디어는 Supabase Storage(S3 호환) 사용.
# 시크릿 값(sync:false)은 Render 대시보드 / Environment Group 에서 입력한다.
#
# [무료 구성 메모]
#  - web 은 plan: free (15분 미사용 시 sleep, 다음 요청 때 30~60초 후 깨어남 — 시연엔 충분)
#  - cron(crawl_news / daily_update) 은 제거 (Render cron 은 무료가 없고 torch 추론은 메모리도 큼)
#  - 뉴스/카드뉴스 등은 배포 후 fixtures/seed_data.json 을 loaddata 로 1회 적재해 채운다.
#  - 갱신이 필요하면 Render web 의 Shell 에서 손으로 한 번씩 실행:
#       python manage.py crawl_news
#       python manage.py daily_update

services:
  # ── 웹 API 서비스 ────────────────────────────────────────────────
  - type: web
    name: jugopa-backend
    runtime: python
    plan: free
    rootDir: backend
    # free 플랜은 preDeployCommand 미지원 → migrate 를 buildCommand 에 포함
    # loaddata 로 시드 적재 (Shell 미지원 우회). 이미 적재돼 있어도 fixture pk 고정이라 덮어씀.
    # 시드 실패가 배포 전체를 막지 않도록 '|| true' 로 감싼다.
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && (python manage.py loaddata fixtures/seed_data.json || true)"
    # Render 가 주입하는 $PORT 에 바인딩해야 "No open ports detected" 가 안 남
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    # healthCheckPath 는 제거: /api/v1/ 루트엔 라우트가 없고(404), 하위 경로는 인증을 요구할 수 있어
    # 헬스체크가 계속 실패하면 배포가 Live 로 전환되지 않음. 무료 단일 서비스에선 헬스체크 없이도 정상 동작.
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: USE_S3
        value: "True"
      # 호스트/오리진 — 실제 도메인으로 채울 것 (콤마 구분)
      - key: ALLOWED_HOSTS
        sync: false   # 예: jugopa-backend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        sync: false   # 예: https://jugopa-backend.onrender.com,https://jugopa.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        sync: false   # 예: https://jugopa.vercel.app
      # 데이터베이스 (Supabase) — Session Pooler URI 권장
      - key: DATABASE_URL
        sync: false
      # 외부 API 키
      - key: FINANCIAL_API_KEY
        sync: false
      - key: GMS_API_KEY
        sync: false
      - key: GMS_BASE_URL
        sync: false
      - key: GMS_MODEL
        value: gpt-5-nano
      - key: GMS_API_KEY2
        sync: false
      - key: GMS_BASE_URL2
        sync: false
      - key: GMS_MODEL2
        value: gpt-5-nano
      # Supabase Storage (S3 호환)
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false   # 예: media
      - key: AWS_S3_ENDPOINT_URL
        sync: false   # 예: https://<project>.supabase.co/storage/v1/s3
      - key: AWS_S3_REGION_NAME
        sync: false   # 예: ap-northeast-2
      - key: AWS_S3_CUSTOM_DOMAIN
        sync: false   # 예: <project-ref>.supabase.co/storage/v1/object/public/media