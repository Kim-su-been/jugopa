# Render Blueprint — Jugopa 백엔드 (Django + Gunicorn)
# DB는 Supabase(Postgres), 미디어는 Supabase Storage(S3 호환) 사용.
# 시크릿 값(sync:false)은 Render 대시보드 / Environment Group 에서 입력한다.
#
# 참고: torch/transformers(KR-FinBert) 추론이 도는 cron 은 RAM 여유가 필요하므로
#       standard(2GB+) 이상 권장. 추론을 하지 않는 web 은 더 작은 티어도 가능.

services:
  # ── 웹 API 서비스 ────────────────────────────────────────────────
  - type: web
    name: jugopa-backend
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    preDeployCommand: "python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application"
    healthCheckPath: /api/v1/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: USE_S3
        value: "True"
      # 호스트/오리진 — 실제 도메인으로 채울 것 (콤마 구분)
      - key: ALLOWED_HOSTS
        sync: false   # 예: jugopa-backend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        sync: false   # 예: https://jugopa-backend.onrender.com,https://jugopa.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        sync: false   # 예: https://jugopa.vercel.app
      # 데이터베이스 (Supabase) — Session Pooler URI 권장
      - key: DATABASE_URL
        sync: false
      # 외부 API 키
      - key: FINANCIAL_API_KEY
        sync: false
      - key: GMS_API_KEY
        sync: false
      - key: GMS_BASE_URL
        sync: false
      - key: GMS_MODEL
        value: gpt-5-nano
      - key: GMS_API_KEY2
        sync: false
      - key: GMS_BASE_URL2
        sync: false
      - key: GMS_MODEL2
        value: gpt-5-nano
      # Supabase Storage (S3 호환)
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false   # 예: media
      - key: AWS_S3_ENDPOINT_URL
        sync: false   # 예: https://<project>.supabase.co/storage/v1/s3
      - key: AWS_S3_REGION_NAME
        sync: false   # 예: ap-northeast-2
      - key: AWS_S3_CUSTOM_DOMAIN
        sync: false   # 예: <project-ref>.supabase.co/storage/v1/object/public/media

  # ── 일배치 cron (감성/카드뉴스) ──────────────────────────────────
  # 10:30 KST = 01:30 UTC
  - type: cron
    name: jugopa-daily-update
    runtime: python
    plan: standard
    rootDir: backend
    schedule: "30 1 * * *"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py daily_update"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - fromGroup: jugopa-backend-env

  # ── 뉴스 크롤링 cron ─────────────────────────────────────────────
  # 일배치보다 앞서 실행 (09:00 KST = 00:00 UTC)
  - type: cron
    name: jugopa-crawl-news
    runtime: python
    plan: starter
    rootDir: backend
    schedule: "0 0 * * *"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py crawl_news"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - fromGroup: jugopa-backend-env

# cron 들이 web 과 동일한 시크릿을 공유하도록 Environment Group 사용.
# 대시보드에서 그룹 값(DATABASE_URL, GMS_*, AWS_* 등)을 web 과 동일하게 채운다.
envVarGroups:
  - name: jugopa-backend-env
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: USE_S3
        value: "True"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FINANCIAL_API_KEY
        sync: false
      - key: GMS_API_KEY
        sync: false
      - key: GMS_BASE_URL
        sync: false
      - key: GMS_MODEL
        value: gpt-5-nano
      - key: GMS_API_KEY2
        sync: false
      - key: GMS_BASE_URL2
        sync: false
      - key: GMS_MODEL2
        value: gpt-5-nano
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false
      - key: AWS_S3_ENDPOINT_URL
        sync: false
      - key: AWS_S3_REGION_NAME
        sync: false
      - key: AWS_S3_CUSTOM_DOMAIN
        sync: false
